name: medfi_app
description: MEDFI Emergency Ambulance App
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.6.1
  google_sign_in: ^7.2.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  http: ^1.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
